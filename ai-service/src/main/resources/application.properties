spring.application.name=ai-service
server.port=4012
spring.webflux.base-path=/ai-service

spring.datasource.url=jdbc:postgresql://192.168.1.6:5433/aiservice
spring.datasource.username=aiservice
spring.datasource.password=aiservice

ai.provider=anthropic

# Used by our AnthropicAdapter (direct SDK)
anthropic.api-key=${ANTHROPIC_API_KEY}

# Used by Spring AI ChatClient
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.model=claude-sonnet-4-6

# Ollama local embeddings (nomic-embed-text, 768 dims) — no API key required
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.model=nomic-embed-text
spring.autoconfigure.exclude=org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration

# pgvector store
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.initialize-schema=false

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/master.xml
spring.liquibase.default-schema=public
spring.liquibase.enabled=true



anthropic.model=claude-sonnet-4-6
anthropic.max-tokens=8192


gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-2.0-flash
gemini.max-tokens=8192
