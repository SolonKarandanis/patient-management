spring.application.name=fts

##################
# Loggind Config  #
##################
# Spring Data Elasticsearch (elc) logger for query JSON
logging.level.org.springframework.data.elasticsearch.client.elc=TRACE
logging.level.tracer=TRACE
logging.level.co.elastic.clients.transport.rest_client=TRACE
logging.level.org.elasticsearch.client.RestClient=TRACE
logging.level.org.apache.hc.client5.http=DEBUG
logging.level.org.apache.hc.client5.http.wire=OFF
logging.level.org.springframework.data.elasticsearch=DEBUG

#############
# Actuator  #
#############
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.prometheus.enabled=true


##################
# Server Config  #
##################
server.port=4006
server.servlet.context-path=/fts

##################
# Elastic Search #
##################
elasticsearch.host=localhost
elasticsearch.port=9200
elasticsearch.scheme=http
elasticsearch.username=elastic
elasticsearch.password=changeme
document.index.pfx=
es.ca-fingerprint=